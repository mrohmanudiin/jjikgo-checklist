<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Generator — JJIKGO</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0A0A0A;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#1A1A1A;border-radius:12px;padding:30px;text-align:center;max-width:420px}
h1{font-size:20px;margin-bottom:4px}
h1 span{color:#C9A84C}
p{color:#888;font-size:13px;margin-bottom:20px}
.icons{display:flex;gap:20px;justify-content:center;margin-bottom:20px}
.icons div{text-align:center}
.icons canvas{border-radius:16px}
.icons span{display:block;font-size:11px;color:#888;margin-top:6px}
button{padding:14px 32px;background:#C9A84C;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
button:hover{background:#A88D3E}
.done{color:#2ECC71;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>JJIKGO<br><span>Icon Generator</span></h1>
  <p>Buka halaman ini 1x untuk generate icon PWA.</p>
  <div class="icons">
    <div>
      <canvas id="c192" width="192" height="192"></canvas>
      <span>icon-192.png</span>
    </div>
    <div>
      <canvas id="c512" width="512" height="512"></canvas>
      <span>icon-512.png</span>
    </div>
  </div>
  <button onclick="generate()">Download Icons</button>
  <div class="done" id="done">Icon berhasil di-generate! Simpan di folder yang sama dengan HTML.</div>
</div>
<script>
function drawIcon(canvas) {
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var cx = w/2, cy = h/2, r = w * 0.4;

  // Background
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, w, h);

  // Gold circle
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#C9A84C';
  ctx.fill();

  // Inner dark circle
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = '#0A0A0A';
  ctx.fill();

  // "JK" text
  var size = r * 0.8;
  ctx.font = 'bold ' + size + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.fillStyle = '#C9A84C';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('JK', cx, cy + size * 0.05);
}

function generate() {
  [document.getElementById('c192'), document.getElementById('c512')].forEach(function(canvas) {
    drawIcon(canvas);
    var link = document.createElement('a');
    link.download = 'icon-' + canvas.width + '.png';
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
  document.getElementById('done').style.display = 'block';
}

// Draw previews
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
